<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>TOCA reset password</title>
    <link href="/auth-pages.css" rel="stylesheet">
  </head>
  <body>
    <main class="shell">
      <section class="brand" aria-label="TOCA">
        <div>
          <p class="brand-title">TOCA</p>
          <p class="brand-kicker">FOOTVOLLEY COMMUNITY</p>
        </div>
      </section>

      <section class="card stack">
        <div class="hero">
          <h1>Reset password</h1>
          <p>Choose a new password for your TOCA account.</p>
        </div>

        <div class="status success visible" id="loading-message">
          <span aria-hidden="true">•</span>
          <span>Preparing secure reset link...</span>
        </div>

        <form class="stack hidden" id="reset-form">
          <div class="hint">
            <span aria-hidden="true">ⓘ</span>
            <span>Use at least 8 letters or numbers.</span>
          </div>
          <div class="field">
            <label for="password">New password</label>
            <input autocomplete="new-password" id="password" minlength="8" required type="password">
          </div>
          <div class="field">
            <label for="confirm-password">Confirm new password</label>
            <input autocomplete="new-password" id="confirm-password" minlength="8" required type="password">
          </div>
          <button class="button" id="submit-button" type="submit">Save new password</button>
        </form>

        <div class="status error" id="error-message"></div>
        <div class="status success" id="success-message"></div>
        <a class="button secondary hidden" href="/" id="return-link">Return to TOCA</a>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth-config.js"></script>
    <script src="/reset-password.js"></script>
  </body>
</html>
